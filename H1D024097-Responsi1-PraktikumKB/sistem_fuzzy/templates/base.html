<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Sistem Fuzzy - Penentuan Kelayakan Bansos{% endblock %}</title>
    <!-- Fonts and Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-gradient-1: #1e40af; /* Blue */
            --bg-gradient-2: #3b82f6; /* Lighter Blue */
            --bg-gradient-3: #059669; /* Emerald Green */
            --bg-gradient-4: #10b981; /* Lighter Green */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, var(--bg-gradient-1), var(--bg-gradient-2), var(--bg-gradient-3), var(--bg-gradient-4));
            display: flex;
            flex-direction: column;
            transition: background 0.5s ease;
        }

        .main-content {
            flex: 1;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .footer {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255, 255, 255, 0.5);
            padding: 20px;
            text-align: center;
            color: #4B5563;
            font-size: 0.85rem;
            font-weight: 500;
            margin-top: auto;
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body id="mainBody">
    <div class="main-content">
        {% block content %}{% endblock %}
    </div>

    <div class="footer">
        <p><i class="fas fa-code"></i> Sistem Fuzzy Penentuan Kelayakan Bansos | &copy; 2026</p>
    </div>

    {% block extra_js %}{% endblock %}
</body>
</html>
